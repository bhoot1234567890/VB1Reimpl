name: Build Plugins

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  JUCE_VERSION: "8.0.4"

jobs:
  # ─── macOS (arm64 + x86_64 universal) ──────────────────────────────────────
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 --branch ${JUCE_VERSION} https://github.com/juce-framework/JUCE

      - name: Configure (Universal arm64 + x86_64)
        run: cmake -B build -DJUCE_DIR=$PWD/JUCE -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package artifacts
        run: |
          mkdir -p artifacts/mac
          cp -R "build/VB1Reimpl_artefacts/Release/VST3/VB-1 reimpl.vst3" artifacts/mac/ 2>/dev/null || true
          cp -R "build/VB1Reimpl_artefacts/Release/AU/VB-1 reimpl.component" artifacts/mac/ 2>/dev/null || true
          cp -R "build/VB1Reimpl_artefacts/Release/Standalone/VB-1 reimpl.app" artifacts/mac/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VB1-macOS-universal
          path: artifacts/mac/

  # ─── Windows (x64) ──────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE

      - name: Configure
        run: cmake -B build -DJUCE_DIR=${{ github.workspace }}/JUCE -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package artifacts
        run: |
          mkdir artifacts\win
          xcopy "build\VB1Reimpl_artefacts\Release\VST3" artifacts\win\ /E /I 2>nul || true
          dir artifacts\win\

      - uses: actions/upload-artifact@v4
        with:
          name: VB1-Windows-x64
          path: artifacts/win/

  # ─── Linux (x64) ────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcomposite-dev libxcursor-dev
          sudo apt-get install -y libxext-dev libxinerama-dev libxrandr-dev libxrender-dev
          sudo apt-get install -y libfreetype6-dev libfontconfig1-dev libglu1-mesa-dev
          sudo apt-get install -y webkit2gtk-4.1 libgtk-3-dev

      - name: Clone JUCE
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE

      - name: Configure
        run: cmake -B build -DJUCE_DIR=$PWD/JUCE -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package artifacts
        run: |
          mkdir -p artifacts/linux
          cp -R "build/VB1Reimpl_artefacts/Release/VST3/VB-1 reimpl.vst3" artifacts/linux/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VB1-Linux-x64
          path: artifacts/linux/
